<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>GET SOME!</h1>
    <div>
        This will do a GET to `https://carlpaton.github.io/d/netify/sample.json`
    </div>
    <br />
    <button class="button">GET DATA</button>
    <h2>LOG</h2>
    <div class="log"></div>
    
<script>
$(document).ready(function () {
    $(".button").click(function () {
        $.ajax({
            type: "GET",
            url: "https://carlpaton.github.io/d/netify/sample.json",
            success: function(data) {
                $(".log").append("success", data);

                console.log("data", data); 
            },
            contentType: "application/json",
            error: function (xhr, error, status) {
                $(".log").append("error:", error); 
                $(".log").append("<br />"); 
                $(".log").append("status:", status); 
                $(".log").append("<br />");  
                $(".log").append("xhr:", JSON.stringify(xhr)); 
                $(".log").append("<br />"); 

                console.log("XXX", xhr);
                console.log("XXX", error);
                console.log("XXX", status);
            }
        });
    });
});
</script>

</body>
</html>
